<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mírame</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}
.stage {
  position:relative;
  width:100%;
  max-width:680px;
  aspect-ratio:680/560;
}
svg { display:block; width:100%; height:100%; }

/* TIMING TOTAL: 38s
   Escena 1 (rosa):   0–13s
   Escena 2 (cumple): 13–25s
   Escena 3 (texto):  25–38s  */

.scene1 { animation: sc1 38s ease-in-out infinite; }
@keyframes sc1 {
  0%   { opacity:0; }
  4%   { opacity:1; }
  32%  { opacity:1; }
  36%  { opacity:0; }
  100% { opacity:0; }
}
.scene2 { animation: sc2 38s ease-in-out infinite; }
@keyframes sc2 {
  0%,34% { opacity:0; }
  40%    { opacity:1; }
  62%    { opacity:1; }
  66%    { opacity:0; }
  100%   { opacity:0; }
}
.scene3 { animation: sc3 38s ease-in-out infinite; }
@keyframes sc3 {
  0%,64% { opacity:0; }
  70%    { opacity:1; }
  96%    { opacity:1; }
  100%   { opacity:0; }
}

.flash {
  position:absolute; inset:0;
  background:#fff8e0; opacity:0; pointer-events:none;
  animation: fl 38s ease-in-out infinite;
}
@keyframes fl {
  0%,33%  { opacity:0; }
  35%     { opacity:0.35; }
  39%     { opacity:0; }
  63%     { opacity:0; }
  65%     { opacity:0.35; }
  69%     { opacity:0; }
  100%    { opacity:0; }
}

#startBtn {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#1a0a3a,#000010);
  color:#ffd966;
  border:2px solid #cc9900;
  padding:18px 40px;
  font-size:18px;
  font-family:Georgia,serif;
  font-weight:bold;
  border-radius:4px;
  cursor:pointer;
  box-shadow:0 0 30px rgba(255,210,80,0.4);
  z-index:100;
  letter-spacing:2px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.replay {
  position:absolute; bottom:10px; right:10px;
  background:rgba(255,220,100,0.12);
  border:1px solid #cc9900; color:#ffd966;
  padding:6px 14px; border-radius:4px;
  cursor:pointer; font-family:Georgia,serif; font-size:13px;
  display:none; z-index:10;
}
.replay.show { display:block; }

/* ===== ANIMACIONES ===== */
@keyframes tw1 { 0%,100%{opacity:0.2} 50%{opacity:1} }
@keyframes tw2 { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
@keyframes tw3 { 0%,100%{opacity:0.1} 50%{opacity:0.7} }
@keyframes nebS { 0%,100%{opacity:0.35} 50%{opacity:0.55} }
@keyframes mwA  { 0%,100%{opacity:0.15} 50%{opacity:0.25} }
@keyframes rGl  { 0%,100%{filter:drop-shadow(0 0 8px rgba(80,120,255,0.5))} 50%{filter:drop-shadow(0 0 22px rgba(100,150,255,0.9))} }
@keyframes rFl  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes petS { 0%,100%{opacity:0.85} 50%{opacity:1} }
@keyframes orb1 { from{transform:rotate(0deg)   translateX(115px) rotate(0deg)}   to{transform:rotate(360deg)  translateX(115px)  rotate(-360deg)} }
@keyframes orb2 { from{transform:rotate(72deg)  translateX(100px) rotate(-72deg)} to{transform:rotate(432deg)  translateX(100px)  rotate(-432deg)} }
@keyframes orb3 { from{transform:rotate(144deg) translateX(110px) rotate(-144deg)}to{transform:rotate(504deg)  translateX(110px)  rotate(-504deg)} }
@keyframes orb4 { from{transform:rotate(216deg) translateX(95px)  rotate(-216deg)}to{transform:rotate(576deg)  translateX(95px)   rotate(-576deg)} }
@keyframes orb5 { from{transform:rotate(288deg) translateX(108px) rotate(-288deg)}to{transform:rotate(648deg)  translateX(108px)  rotate(-648deg)} }
@keyframes sf1 { 0%{opacity:0;transform:translate(0,0)} 5%{opacity:1} 20%{opacity:0;transform:translate(200px,100px)} 100%{opacity:0;transform:translate(200px,100px)} }
@keyframes sf2 { 0%{opacity:0;transform:translate(0,0)} 5%{opacity:1} 20%{opacity:0;transform:translate(-170px,85px)} 100%{opacity:0;transform:translate(-170px,85px)} }
@keyframes fadeUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes goldGlow { 0%,100%{filter:drop-shadow(0 0 5px rgba(255,210,80,0.4))} 50%{filter:drop-shadow(0 0 15px rgba(255,220,100,0.95))} }
@keyframes spt { 0%,100%{opacity:0.2;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.3)} }
@keyframes lineIn { 0%{opacity:0;transform:translateX(-10px)} 100%{opacity:1;transform:translateX(0)} }
@keyframes cosG { 0%,100%{filter:drop-shadow(0 0 4px rgba(255,220,100,0.3))} 50%{filter:drop-shadow(0 0 10px rgba(255,220,100,0.85))} }

.t1  { animation:tw1 2.5s ease-in-out infinite; }
.t2  { animation:tw2 3.2s ease-in-out infinite; }
.t3  { animation:tw3 1.8s ease-in-out infinite; }
.nb  { animation:nebS 8s ease-in-out infinite; }
.mw  { animation:mwA 10s ease-in-out infinite; }
.rfloat { animation:rFl 5s ease-in-out infinite; transform-origin:340px 280px; }
.rgl    { animation:rGl 3s ease-in-out infinite; transform-origin:340px 280px; }
.ps  { animation:petS 4s ease-in-out infinite; }
.o1  { animation:orb1 12s linear infinite; transform-origin:340px 280px; }
.o2  { animation:orb2 15s linear infinite; transform-origin:340px 280px; }
.o3  { animation:orb3 18s linear infinite; transform-origin:340px 280px; }
.o4  { animation:orb4 14s linear infinite; transform-origin:340px 280px; }
.o5  { animation:orb5 16s linear infinite; transform-origin:340px 280px; }
.sp2 { animation:spt 2.2s ease-in-out infinite; }
.SF1 { animation:sf1 8s ease-in infinite; }
.SF2 { animation:sf2 9s ease-in infinite 3s; }
.SF3 { animation:sf1 7s ease-in infinite 1s; }
.SF4 { animation:sf2 8s ease-in infinite 2s; }
.SF5 { animation:sf1 9s ease-in infinite 4s; }

/* Textos escena 2 */
.w1 { animation:fadeUp 1s ease-out 15s both; }
.w2 { animation:fadeUp 1s ease-out 17s both; }
.w3 { animation:fadeUp 1s ease-out 19s both; }
.gg { animation:goldGlow 3s ease-in-out infinite; }

/* Textos escena 3 */
.p1 { animation:lineIn 1s ease-out 27s   both; }
.p2 { animation:lineIn 1s ease-out 28.8s both; }
.p3 { animation:lineIn 1s ease-out 30.5s both; }
.p4 { animation:lineIn 1s ease-out 32.2s both; }
.p5 { animation:lineIn 1.2s ease-out 33.8s both; }
.cg { animation:cosG 3s ease-in-out infinite; }
</style>
</head>

<div class="stage">

<button id="startBtn" onclick="iniciarTodo(event)">▶ INICIAR</button>

<audio id="audioPlayer" preload="auto" playsinline webkit-playsinline style="display:none;">
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
function iniciarTodo(e) {
  if(e) e.preventDefault();
  var btn   = document.getElementById('startBtn');
  var audio = document.getElementById('audioPlayer');
  var cont  = document.getElementById('animContainer');
  var rb    = document.getElementById('rB');
  audio.load();
  cont.style.opacity = '1';
  audio.volume = 1.0;
  audio.muted  = false;
  // Al terminar la canción mostrar botón de repetir
  audio.addEventListener('ended', function() {
    rb.classList.add('show');
  });
  var p = audio.play();
  if(p !== undefined) {
    p.then(function()  { btn.style.display = 'none'; })
     .catch(function() { btn.style.display = 'none'; });
  } else {
    btn.style.display = 'none';
  }
}
</script>
